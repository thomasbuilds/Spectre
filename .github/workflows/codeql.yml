name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 25

    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: java-kotlin
            build-mode: manual

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up JDK 25
        if: matrix.build-mode == 'manual'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Android SDK
        if: matrix.build-mode == 'manual'
        uses: android-actions/setup-android@v4
        with:
          packages: platform-tools

      - name: Set up Gradle
        if: matrix.build-mode == 'manual'
        uses: gradle/actions/setup-gradle@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # build-mode: none does not extract Kotlin, so the java-kotlin database is
      # built by tracing a real compile. --no-daemon keeps the compiler in the
      # traced process, and --no-build-cache forces compileDebugKotlin to actually
      # run instead of being served FROM-CACHE, so CodeQL can trace it.
      - name: Build for CodeQL
        if: matrix.build-mode == 'manual'
        run: ./gradlew --no-daemon --no-build-cache :app:compileDebugKotlin

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
