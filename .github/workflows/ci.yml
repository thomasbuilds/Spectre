name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Format check (Spotless / ktlint)
        run: ./gradlew --no-daemon spotlessCheck

      - name: Android Lint
        run: ./gradlew --no-daemon :app:lintDebug

      - name: Assemble debug APK
        env:
          COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: ./gradlew --no-daemon :app:assembleDebug -Pcommit=${COMMIT_SHA:0:7}

      - name: Upload Lint reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: lint-reports
          path: app/build/reports/lint-results-*.html
          retention-days: 7

      - name: Upload debug APK (PR builds only)
        id: apk
        if: success() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.pull_request.head.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Comment APK download link on PR
        if: success() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v9
        with:
          script: |
            const url = ${{ toJSON(steps.apk.outputs.artifact-url) }};
            const marker = '<!-- spectre-debug-apk -->';
            const sha = context.payload.pull_request.head.sha.substring(0, 7);
            const body = `${marker}\n[Download the debug APK](${url}) for commit \`${sha}\``;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
